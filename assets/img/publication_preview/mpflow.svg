<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 382" width="1040" height="382" role="img" aria-label="MP-Flow reinforcement learning loop: an MPNN policy observes the Lightning graph, opens one channel, and is rewarded by the increase in max flow. The loop is revealed step by step: environment, agent, state, action, reward.">
  <defs>
    <marker id="mp-arrow-state" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8.5,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="mp-arrow-opened" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8.5,3 z" fill="#2563eb"/>
    </marker>
    <marker id="mp-arrow-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8.5,3 z" fill="#e65100"/>
    </marker>
    <filter id="mp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    svg { font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    text { -webkit-user-select: none; user-select: none; }

    /* Each presentation "reveal" fades in in sequence, holds, then the loop resets. */
    .stage { opacity: 0; }
    .stage1 { animation: rev1 9s infinite linear; }
    .stage2 { animation: rev2 9s infinite linear; }
    .stage3 { animation: rev3 9s infinite linear; }
    .stage4 { animation: rev4 9s infinite linear; }
    .stage5 { animation: rev5 9s infinite linear; }

    @keyframes rev1 { 0%,3% { opacity: 0; } 5%,93% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes rev2 { 0%,16% { opacity: 0; } 18%,93% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes rev3 { 0%,31% { opacity: 0; } 33%,93% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes rev4 { 0%,48% { opacity: 0; } 50%,93% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes rev5 { 0%,64% { opacity: 0; } 66%,93% { opacity: 1; } 100% { opacity: 0; } }

    /* Gentle pulse on the selected policy score, active while the agent is on screen. */
    .pick { animation: pickPulse 9s infinite ease-in-out; }
    @keyframes pickPulse {
      0%,18% { opacity: 0; }
      22% { opacity: 1; }
      30% { transform: scaleY(1); }
      36% { transform: scaleY(1.14); }
      42% { transform: scaleY(1); }
      93% { opacity: 1; }
      100% { opacity: 0; }
    }
    .pick { transform-box: fill-box; transform-origin: bottom; }

    @media (prefers-reduced-motion: reduce) {
      .stage, .pick { animation: none; opacity: 1; }
    }
  </style>

  <!-- (1) ENVIRONMENT panel -->
  <g class="stage stage1">
    <rect x="52" y="52" width="430" height="316" rx="10" fill="#ffffff" stroke="#d7dee8" filter="url(#mp-shadow)"/>
    <text x="72" y="82" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="1.5">ENVIRONMENT</text>
    <text x="72" y="106" font-size="17" font-weight="900" fill="#1a202c">Lightning graph</text>

    <!-- budget tracker -->
    <text x="410" y="82" text-anchor="end" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="1">BUDGET</text>
    <g>
      <rect x="264" y="90" width="26" height="18" rx="5" fill="#2563eb"/>
      <rect x="296" y="90" width="26" height="18" rx="5" fill="#2563eb"/>
      <rect x="328" y="90" width="26" height="18" rx="5" fill="#fff7ed" stroke="#e65100" stroke-width="2.5"/>
      <rect x="360" y="90" width="26" height="18" rx="5" fill="#eef2f7" stroke="#cbd5e0" stroke-width="1.5"/>
      <rect x="392" y="90" width="26" height="18" rx="5" fill="#eef2f7" stroke="#cbd5e0" stroke-width="1.5"/>
    </g>

    <!-- mini graph -->
    <g>
      <!-- network edges (topology) -->
      <g stroke="#dbe2ea" stroke-width="2" fill="none">
        <path d="M132 120 L198 227"/>
        <path d="M132 120 L123 296"/>
        <path d="M198 227 L123 296"/>
        <path d="M198 227 L338 198"/>
        <path d="M338 198 L420 130"/>
        <path d="M338 198 L422 289"/>
        <path d="M420 130 L422 289"/>
      </g>
      <!-- candidate consideration fan from the new node (faint dashed) -->
      <g stroke="#7c3aed" stroke-width="2" fill="none" stroke-dasharray="7 7" opacity="0.4" stroke-linecap="round">
        <path d="M254 328 L132 120"/>
        <path d="M254 328 L198 227"/>
        <path d="M254 328 L338 198"/>
        <path d="M254 328 L422 289"/>
      </g>
      <!-- opened channels (blue solid): to Erin and Dave -->
      <path d="M254 328 L123 296" stroke="#2563eb" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M254 328 L420 130" stroke="#2563eb" stroke-width="5.5" stroke-linecap="round"/>
      <!-- candidate peers (purple): Alice, Bob, Carol, Frank -->
      <circle cx="132" cy="120" r="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="3"/>
      <circle cx="198" cy="227" r="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="3"/>
      <circle cx="338" cy="198" r="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="3"/>
      <circle cx="422" cy="289" r="15" fill="#f3e8ff" stroke="#7c3aed" stroke-width="3"/>
      <!-- opened peers (blue): Erin, Dave -->
      <circle cx="123" cy="296" r="15" fill="#e8f0fe" stroke="#2563eb" stroke-width="3"/>
      <circle cx="420" cy="130" r="15" fill="#e8f0fe" stroke="#2563eb" stroke-width="3"/>
      <!-- new node -->
      <circle cx="254" cy="328" r="22" fill="#fff7ed" stroke="#e65100" stroke-width="4"/>
      <text x="254" y="335" text-anchor="middle" font-size="17" font-weight="900" fill="#e65100">S</text>
      <!-- labels -->
      <text x="254" y="362" text-anchor="middle" font-size="14" font-weight="800" fill="#e65100">new node</text>
      <text x="123" y="322" text-anchor="middle" font-size="14" font-weight="800" fill="#2563eb">opened</text>
      <text x="432" y="314" text-anchor="middle" font-size="14" font-weight="800" fill="#7c3aed">candidates</text>
    </g>
  </g>

  <!-- (2) AGENT panel -->
  <g class="stage stage2">
    <rect x="646" y="96" width="342" height="228" rx="10" fill="#ffffff" stroke="#d8b4fe" filter="url(#mp-shadow)"/>
    <text x="668" y="126" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="1.5">AGENT</text>
    <text x="668" y="150" font-size="17" font-weight="900" fill="#7c3aed">MPNN policy</text>
    <text x="668" y="174" font-size="16" font-weight="700" fill="#475569">scores every feasible node</text>
    <!-- score bars -->
    <g transform="translate(676 196)">
      <rect x="0" y="66" width="34" height="26" rx="4" fill="#e9d5ff"/>
      <rect x="52" y="40" width="34" height="52" rx="4" fill="#c4b5fd"/>
      <rect class="pick" x="104" y="8" width="34" height="84" rx="4" fill="#7c3aed"/>
      <rect x="156" y="52" width="34" height="40" rx="4" fill="#c4b5fd"/>
      <rect x="208" y="70" width="34" height="22" rx="4" fill="#e9d5ff"/>
      <text x="121" y="-2" text-anchor="middle" font-size="14" font-weight="900" fill="#7c3aed">pick best</text>
    </g>
  </g>

  <!-- (3) state: environment -> agent -->
  <g class="stage stage3">
    <path d="M486 140 H642" fill="none" stroke="#7c3aed" stroke-width="3.5" marker-end="url(#mp-arrow-state)"/>
    <text x="564" y="124" text-anchor="middle" font-size="16" font-weight="900" fill="#7c3aed">1) state s<tspan baseline-shift="sub" font-size="12.5">t</tspan></text>
    <text x="564" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b">current graph</text>
  </g>

  <!-- (4) action: agent -> environment -->
  <g class="stage stage4">
    <path d="M642 218 H486" fill="none" stroke="#2563eb" stroke-width="3.5" marker-end="url(#mp-arrow-opened)"/>
    <text x="564" y="202" text-anchor="middle" font-size="16" font-weight="900" fill="#2563eb">2) action a<tspan baseline-shift="sub" font-size="12.5">t</tspan></text>
    <text x="564" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b">open one channel, 0.2 &#8383;</text>
  </g>

  <!-- (5) reward: environment -> agent -->
  <g class="stage stage5">
    <path d="M486 296 H642" fill="none" stroke="#e65100" stroke-width="3.5" marker-end="url(#mp-arrow-orange)"/>
    <text x="564" y="280" text-anchor="middle" font-size="16" font-weight="900" fill="#e65100">3) reward r<tspan baseline-shift="sub" font-size="12.5">t</tspan></text>
    <text x="564" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#64748b">max flow gain</text>
  </g>
</svg>
